<!-- index.html -->
<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore — Интернет-магазин электроники</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">
                <span class="logo__icon">🛒</span>
                <span class="logo__text">TechStore</span>
            </a>
            <nav class="nav">
                <ul class="nav_list">
                    <li class="nav_item">
                        <a href="index.html" class="nav__link">Главная</a>
                    </li>
                    <li class="nav__item">

                        <a href="catalog.html" class="nav_link">Каталог</a>
                    </li>
                    <li class="nav_item">
                        <a href="about.html" class="nav_link">О нас</a>
                    </li>
                </ul>
            </nav>
            <div class="header__icons">
                <a href="#" class="icon-btn" title="Поиск">🔍</a>
                <a href="#" class="icon-btn" title="Корзина">🛒</a>
            </div>
        </div>
    </header>


    <section class="hero">
        <div class="container">
            <h1 class="hero__title">TechStore</h1>
            <p class="hero__subtitle">Лучшая электроника по доступным ценам</p>
            <a href="catalog.html" class="btn btn--primary">Посмотреть каталог</a>
        </div>
    </section>

    <section class="popular">
        <div class="container">
            <h2 class="section-title">Популярные товары</h2>
            <div class="products-grid products-grid--3">
            </div>
            <div class="section-btn-wrap">
                <a href="catalog.html" class="btn btn--outline">Смотреть все товары</a>
            </div>
        </div>
    </section>

    <section class="advantages">
        <div class="container">
            <h2 class="section-title">Наши преимущества</h2>
            <div class="advantages__grid">
            </div>
        </div>
    </section>

    <footer class="footer">
    </footer>
 
</body>
</html>
